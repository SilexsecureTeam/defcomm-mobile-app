# Allocates 4GB of RAM to the Gradle Daemon (Good balance)
org.gradle.jvmargs=-Xmx4096M -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError

# Required for Flutter
android.useAndroidX=true
android.enableJetifier=true

# Allocates 2.5GB specifically for the Kotlin Compiler (Fixes your crash)
kotlin.daemon.jvm.options=-Xmx2560M